<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OpenClaw Assessores</title>
    <!-- Usando Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --surface-50: #f8fafc;
            --surface-100: #f1f5f9;
            --surface-200: #e2e8f0;
            --surface-300: #cbd5e1;
            --surface-400: #94a3b8;
            --surface-500: #64748b;
            --surface-600: #475569;
            --surface-700: #334155;
            --surface-800: #1e293b;
            --surface-900: #0f172a;
            
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --danger-500: #ef4444;
            --danger-50: #fef2f2;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--surface-50);
            color: var(--surface-800);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--surface-900);
        }

        p.subtitle {
            color: var(--surface-500);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--surface-700);
        }

        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--surface-300);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary-600);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-500);
        }

        .error-alert {
            background-color: var(--danger-50);
            border: 1px solid #fecaca;
            color: var(--danger-500);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--surface-400);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <div class="brand-icon">⚖️</div>
        <h1>OpenClaw Assessores</h1>
        <p class="subtitle">Acesso Restrito</p>
    </div>

    {% if error %}
    <div class="error-alert">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="password">Token de Acesso</label>
            <input type="password" id="password" name="password" placeholder="Insira o token de segurança" required autofocus>
        </div>
        
        <button type="submit">Acessar Sistema</button>
    </form>

    <div class="footer">
        TJPR • Modos de Operação Seguro
    </div>
</div>

</body>
</html>
